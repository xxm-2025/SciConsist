# SciConsist Pilot Experiment Configuration
# Usage: python scripts/train_feh.py --config-path ../run/conf --config-name pilot

# --- Model ---
model:
  hidden_dim: 4096          # InternVL2.5-8B hidden dim
  latent_dim: 512           # FEH projection dim
  num_classes: 3            # ENTAILS=0, NEUTRAL=1, CONTRADICTS=2
  dropout: 0.1
  # 取 InternVL 的哪些层做 multi-layer fusion (0-indexed)
  # InternVL2.5-8B 有 32 层, 取 L/4=8, L/2=16, 3L/4=24, L=31
  fuse_layer_indices: [8, 16, 24, 31]

# --- Feature Extraction ---
features:
  reward_encoder: "OpenGVLab/InternVL2_5-8B"
  policy_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  batch_size: 8
  max_length: 2048
  cache_dir: "data/processed/features"
  use_full_figure: true     # P4 实验: true=全图, false=裁剪区域

# --- Data ---
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  # FEH 训练数据配比
  num_entails: 50000
  num_neutral: 50000
  num_contradicts: 50000
  # 数值篡改梯度 (用于 hard negative mining)
  perturbation_ratios: [0.01, 0.02, 0.05, 0.10, 0.20]
  perturbation_distribution:  # 每种幅度在 CONTRADICTS 集中的占比
    "0.01": 0.15
    "0.02": 0.15
    "0.05": 0.30
    "0.10": 0.20
    "0.20": 0.20
  train_split: 0.9
  seed: 42

# --- Training ---
training:
  epochs: 5
  batch_size: 256
  lr: 1e-3
  weight_decay: 0.01
  class_weights: null
  warmup_ratio: 0.1
  scheduler: "cosine"
  require_real_features: false
  early_stopping_patience: 3
  device: "cuda"
  seed: 42

# --- Pilot Experiments ---
pilot:
  # P1: FEH 基础准确率
  p1:
    go_threshold: 0.75       # accuracy > 75% → Go
    nogo_threshold: 0.65     # accuracy < 65% → 需要调整
  # P2: 数值粒度敏感度
  p2:
    perturbation_levels: [0.01, 0.02, 0.05, 0.10, 0.15, 0.20]
    target_detection_at_5pct: 0.60   # ±5% 时检出率 > 60%
    num_samples_per_level: 200
  # P3: Many-to-One 解决
  p3:
    num_samples: 50
    target_non_contradict: 0.80      # ENTAILS+NEUTRAL > 80%
  # P4: Full figure vs cropped region
  p4:
    num_samples: 100
    max_accuracy_gap: 0.05   # 差距 < 5% → 用 full figure
  # P5: Cross-model vs Same-model
  p5:
    max_accuracy_gap: 0.10   # 差距 < 10% → cross-model 可行

# --- VSR Reward ---
vsr:
  lambda_coverage: 0.1
  lambda_specificity: 0.05
  layer_weights:
    0: 0.5     # Symbolic (unhackable)
    1: 0.3     # Semi-Symbolic
    2: 0.2     # Learned
  fallback_confidence_gate: 0.7
  symbolic:
    entity_match_threshold: 0.7
    value_exact_tolerance: 0.05
    value_approx_tolerance_pct: 1.0
    confidence_gate: 0.9
    exact_match_reward: 1.0
    approx_match_reward: 0.8
    mismatch_reward: -1.0
  semi_symbolic:
    # SemiSymbolicVerifierConfig defaults
    relation_correct_reward: 0.8
    relation_partial_reward: 0.5
    relation_wrong_reward: -0.8
    trend_correct_reward: 0.8
    trend_wrong_reward: -0.8

# --- VSR-GRPO Training ---
vsr_grpo:
  policy_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: "q_proj,k_proj,v_proj,o_proj"
  epochs: 1
  group_size: 4
  max_new_tokens: 256
  temperature: 0.8
  lr: 1.0e-5
  adv_scale: 0.5
  max_seq_len: 2048
  ema_decay: 0.95
  splits_filter: "tqa,mqa"
  source_filter: "arxiv"
  data:
    train: "/root/shared-nvme/sciconsist_pilot/processed/scimdr_sft_train.jsonl"
    val: "/root/shared-nvme/sciconsist_pilot/processed/scimdr_sft_val.jsonl"
    table_index: "/root/shared-nvme/sciconsist_pilot/processed/table_structured/paper_tables.jsonl"

# --- Output ---
output:
  dir: "outputs"
  log_dir: "outputs/logs"
  checkpoint_dir: "outputs/checkpoints"
  figure_dir: "outputs/figures"
  table_dir: "outputs/tables"
